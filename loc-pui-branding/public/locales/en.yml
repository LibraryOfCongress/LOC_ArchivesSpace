    frontend_name_short: "Home"
    about_this_site: "Finding Aids to Archival Collections at the Library of Congress contains finding aids for the special collections held by Library Divisions and Research Centers. Use this site to search and browse the finding aids describing our collections and materials.<br><br>To find Help Resources, <a href='https://guides.loc.gov/finding-aids' style='text-decoration: underline;'>visit the research guide</a> for finding aids and documentation."
    about_finding_aids: "A finding aid, also called a collection guide, is a description of an archival collection. Archival collections contain primary sources and other unique, original, or rare materials. The finding aid provides a hierarchical inventory of collection materials, as well as information about the origin of the collection."
    about_ask_a_librarian_html: "<b>Have a question? Need assistance?</b> Our librarians and program specialists are here to help you search, access, use, and understand our collections. To submit a question, visit <a href='http://ask.loc.gov' style='text-decoration: underline;'>ask.loc.gov</a> and select the relevant subject or service, or chat with our online experts."
